name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: build + publish release
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build Tally.app
        env:
          CONFIG: release
        run: ./Scripts/bundle.sh

      - name: Stamp version into Info.plist
        run: |
          plutil -replace CFBundleShortVersionString -string "${{ steps.version.outputs.version }}" build/Tally.app/Contents/Info.plist
          plutil -replace CFBundleVersion              -string "${{ steps.version.outputs.version }}" build/Tally.app/Contents/Info.plist

      - name: Re-sign bundle after Info.plist edit
        run: codesign --force --deep --sign - build/Tally.app

      - name: Package .app.zip
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/Tally.app \
            "build/Tally-${{ steps.version.outputs.version }}.zip"

      - name: Package .dmg
        run: |
          hdiutil create -volname Tally \
            -srcfolder build/Tally.app \
            -ov -format UDZO \
            "build/Tally-${{ steps.version.outputs.version }}.dmg"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Tally-${{ steps.version.outputs.version }}.zip
            build/Tally-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
